version: 2

models:
  - name: stg_crypto_prices
    description: Staged and filtered raw price events
    columns:
      - name: coin_id
        tests:
          - not_null
          - accepted_values:
              values: ['bitcoin', 'ethereum', 'solana']
      - name: source
        tests:
          - not_null
          - accepted_values:
              values: ['coingecko', 'binance']
      - name: price_usd
        tests:
          - not_null
      - name: recorded_at
        tests:
          - not_null

  - name: crypto_prices_clean
    description: Deduplicated silver price facts
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - coin_id
            - source
            - recorded_at
    columns:
      - name: coin_id
        tests:
          - not_null
      - name: source
        tests:
          - not_null
      - name: price_usd
        tests:
          - not_null
