version: 2

models:
  - name: mart_latest_prices
    description: >
      One row per coin — latest CoinGecko price only (reference for legacy BI).
      For multi-source use mart_latest_prices_by_source.
    columns:
      - name: coin_id
        description: Canonical asset id
        tests:
          - not_null
          - unique
          - accepted_values:
              values: ['bitcoin', 'ethereum', 'solana']
      - name: symbol
        description: Ticker symbol
      - name: price_usd
        description: Latest CoinGecko USD price
        tests:
          - not_null
      - name: market_cap
        description: Latest market cap from CoinGecko
      - name: change_24h
        description: Latest 24h change from CoinGecko
      - name: last_recorded_at
        description: Timestamp of the latest CoinGecko tick
        tests:
          - not_null

  - name: mart_latest_prices_by_source
    description: >
      Latest price snapshot per (coin_id, source). Primary table for multi-source BI.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - coin_id
            - source
    columns:
      - name: coin_id
        description: Canonical asset id
        tests:
          - not_null
      - name: source
        description: coingecko or binance
        tests:
          - not_null
          - accepted_values:
              values: ['coingecko', 'binance']
      - name: symbol
        description: Ticker symbol
      - name: price_usd
        description: Latest USD price for this source
      - name: market_cap
        description: Market cap when available
      - name: change_24h
        description: 24h change when available
      - name: last_recorded_at
        description: Timestamp of latest tick for this source

  - name: mart_source_price_comparison
    description: >
      Pivoted comparison of CoinGecko vs Binance latest prices with spread_usd
      and spread_pct. Requires both sources present per coin.
    columns:
      - name: coin_id
        description: Canonical asset id
        tests:
          - not_null
          - unique
      - name: symbol
        description: Ticker symbol
      - name: coingecko_price_usd
        description: Latest CoinGecko price
        tests:
          - not_null
      - name: binance_price_usd
        description: Latest Binance throttled trade price
        tests:
          - not_null
      - name: coingecko_at
        description: CoinGecko tick timestamp
      - name: binance_at
        description: Binance tick timestamp
      - name: spread_usd
        description: binance_price_usd minus coingecko_price_usd
      - name: spread_pct
        description: Spread as percent of CoinGecko price

  - name: mart_daily_prices
    description: >
      Daily aggregates (avg/min/max/count) per coin and source for trend charts.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - coin_id
            - source
            - price_date
    columns:
      - name: coin_id
        description: Canonical asset id
      - name: source
        description: coingecko or binance
      - name: price_date
        description: Calendar date (UTC) of aggregated ticks
      - name: avg_price_usd
        description: Mean USD price for the day
      - name: max_price_usd
        description: Max USD price for the day
      - name: min_price_usd
        description: Min USD price for the day
      - name: sample_count
        description: Number of ticks in the day
        tests:
          - not_null

  - name: mart_zone_volume
    description: >
      Row counts by zone and source for data-quality dashboards (raw/silver/gold).
    columns:
      - name: zone
        description: Pipeline zone label (raw, silver, gold_latest_by_source)
      - name: source
        description: coingecko or binance
      - name: row_count
        description: Number of rows in the 24h window (gold is current snapshot count)

  - name: mart_gold_sanity
    description: >
      Null and non-positive price checks on gold marts for BI quality dashboards.
    columns:
      - name: mart
        description: Gold table name
      - name: total_rows
        description: Total rows in the mart
      - name: null_prices
        description: Rows with null price fields
      - name: non_positive_prices
        description: Rows with price <= 0

  - name: mart_freshness_by_source
    description: >
      Minutes since last tick per source with SLA status (OK/WARN/FAIL).
    columns:
      - name: source
        description: coingecko or binance
      - name: last_event_at
        description: Timestamp of latest tick for this source
      - name: minutes_stale
        description: Minutes since last_event_at
      - name: sla_status
        description: OK if <= 10 min, WARN if <= 30 min, else FAIL

  - name: fct_price_changes
    description: >
      Point-to-point price change between consecutive ticks per coin and source.
    columns:
      - name: coin_id
        description: Canonical asset id
        tests:
          - not_null
      - name: source
        description: coingecko or binance
        tests:
          - not_null
      - name: recorded_at
        description: Current tick timestamp
        tests:
          - not_null
      - name: price_usd
        description: Current tick price
      - name: prev_price_usd
        description: Previous tick price
      - name: price_change_usd
        description: Absolute change vs previous tick
      - name: price_change_pct
        description: Percent change vs previous tick
