apiVersion: 1

datasources:
  - name: Prometheus
    uid: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: PostgreSQL
    uid: PostgreSQL
    type: postgres
    access: proxy
    url: postgres:5432
    user: pulse
    secureJsonData:
      password: pulse
    jsonData:
      database: cryptopulse
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
    editable: false
