services:
  kafka-volume-init:
    image: busybox:1.36
    container_name: crypto-pulse-kafka-volume-init
    user: "0"
    volumes:
      - kafka_data:/var/lib/kafka/data
    command: ["sh", "-c", "mkdir -p /var/lib/kafka/data && chown -R 1000:1000 /var/lib/kafka/data"]
    restart: "no"

  flink-checkpoints-volume-init:
    image: busybox:1.36
    container_name: crypto-pulse-flink-checkpoints-volume-init
    user: "0"
    volumes:
      - flink_checkpoints:/tmp/flink-checkpoints
    command: ["sh", "-c", "mkdir -p /tmp/flink-checkpoints && chown -R 9999:9999 /tmp/flink-checkpoints"]
    restart: "no"

  kafka:
    image: apache/kafka:3.9.2
    container_name: crypto-pulse-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9091
      KAFKA_LISTENERS: CONTROLLER://localhost:9091,HOST://0.0.0.0:9092,DOCKER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: HOST://localhost:9092,DOCKER://kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,DOCKER:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: DOCKER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: ${KAFKA_LOG_RETENTION_HOURS:-168}
      KAFKA_NUM_PARTITIONS: ${KAFKA_TOPIC_PARTITIONS:-3}
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    depends_on:
      kafka-volume-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 8
      start_period: 45s
    restart: unless-stopped

  kafka-init:
    image: apache/kafka:3.9.2
    container_name: crypto-pulse-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVER: kafka:9093
      KAFKA_TOPIC_RETENTION_MS: ${KAFKA_TOPIC_RETENTION_MS:-604800000}
      KAFKA_TOPIC_PARTITIONS: ${KAFKA_TOPIC_PARTITIONS:-3}
      KAFKA_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_DLQ_TOPIC: ${KAFKA_DLQ_TOPIC:-crypto-pulse.dlq}
    volumes:
      - ./ci/kafka_init_topics.sh:/init/kafka_init_topics.sh:ro
    entrypoint: ["/bin/bash", "/init/kafka_init_topics.sh"]
    restart: "no"

  postgres:
    image: postgres:16
    container_name: crypto-pulse-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: cryptopulse
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse -d cryptopulse"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    container_name: crypto-pulse-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: crypto-pulse-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-crypto-pulse}
    entrypoint: >
      /bin/sh -c "
      mc alias set cp http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb cp/$${MINIO_BUCKET} --ignore-existing &&
      echo MinIO bucket $${MINIO_BUCKET} ready
      "
    restart: "no"

  ingest:
    build:
      context: .
      dockerfile: ingest/Dockerfile
    container_name: crypto-pulse-ingest
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped

  binance-ingest:
    build:
      context: .
      dockerfile: binance-ingest/Dockerfile
    container_name: crypto-pulse-binance-ingest
    env_file:
      - .env
    ports:
      - "8001:8001"
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped

  dlq-monitor:
    build:
      context: .
      dockerfile: dlq-monitor/Dockerfile
    container_name: crypto-pulse-dlq-monitor
    env_file:
      - .env
    ports:
      - "8002:8002"
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped

  flink-jobmanager:
    build:
      context: ./flink
    container_name: crypto-pulse-flink-jm
    command: jobmanager
    ports:
      - "8081:8081"
      - "9249:9249"
    env_file:
      - .env
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        parallelism.default: 1
        metrics.reporters: prom
        metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
        metrics.reporter.prom.port: 9249
        s3.endpoint: http://minio:9000
        s3.path-style-access: true
        s3.access-key: minioadmin
        s3.secret-key: minioadmin
        state.checkpoints.dir: file:///tmp/flink-checkpoints
        execution.checkpointing.interval: 30s
        execution.checkpointing.mode: EXACTLY_ONCE
        restart-strategy.type: fixed-delay
        restart-strategy.fixed-delay.attempts: 10
        restart-strategy.fixed-delay.delay: 15s
    volumes:
      - flink_checkpoints:/tmp/flink-checkpoints
    depends_on:
      flink-checkpoints-volume-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/overview || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  flink-taskmanager:
    build:
      context: ./flink
    container_name: crypto-pulse-flink-tm
    command: taskmanager
    ports:
      - "9250:9250"
    env_file:
      - .env
    depends_on:
      flink-checkpoints-volume-init:
        condition: service_completed_successfully
      flink-jobmanager:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
        metrics.reporters: prom
        metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
        metrics.reporter.prom.port: 9250
        s3.endpoint: http://minio:9000
        s3.path-style-access: true
        s3.access-key: minioadmin
        s3.secret-key: minioadmin
        state.checkpoints.dir: file:///tmp/flink-checkpoints
    volumes:
      - flink_checkpoints:/tmp/flink-checkpoints
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://flink-jobmanager:8081/overview | grep -qE '\"taskmanagers\":[1-9]'"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    restart: unless-stopped

  flink-submitter:
    build:
      context: ./flink
    container_name: crypto-pulse-flink-submitter
    network_mode: service:flink-jobmanager
    command: /opt/flink/submit-job.sh
    environment:
      FLINK_JOBMANAGER: localhost
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      flink-jobmanager:
        condition: service_healthy
      flink-taskmanager:
        condition: service_healthy
      ingest:
        condition: service_started
    restart: "no"

  flink-watchdog:
    build:
      context: ./flink
    container_name: crypto-pulse-flink-watchdog
    command: /opt/flink/watchdog.sh
    environment:
      FLINK_JOBMANAGER: flink-jobmanager
      FLINK_WATCHDOG_INTERVAL_SECONDS: ${FLINK_WATCHDOG_INTERVAL_SECONDS:-60}
    depends_on:
      flink-submitter:
        condition: service_completed_successfully
      flink-jobmanager:
        condition: service_healthy
      flink-taskmanager:
        condition: service_healthy
    restart: unless-stopped

  transform:
    build:
      context: .
      dockerfile: transform/Dockerfile
    container_name: crypto-pulse-transform
    env_file:
      - .env
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.8.0
    container_name: crypto-pulse-kafka-exporter
    command:
      - "--kafka.server=kafka:9093"
      - "--log.level=info"
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: crypto-pulse-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://pulse:pulse@postgres:5432/cryptopulse?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: crypto-pulse-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    depends_on:
      - kafka-exporter
      - postgres-exporter
      - ingest
      - binance-ingest
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.5.2
    container_name: crypto-pulse-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  metabase:
    image: metabase/metabase:v0.53.3.1
    container_name: crypto-pulse-metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: pulse
      MB_DB_PASS: pulse
      MB_DB_HOST: postgres
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # LocalStack emulates AWS S3/IAM for terraform/ (profile: terraform). Not used by the main pipeline.
  localstack:
    profiles: ["terraform"]
    image: localstack/localstack:3
    container_name: crypto-pulse-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,iam
      DEFAULT_REGION: eu-west-1
      EAGER_SERVICE_LOADING: 1
    volumes:
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: unless-stopped

volumes:
  postgres_data:
  kafka_data:
  flink_checkpoints:
  minio_data:
  prometheus_data:
  grafana_data:
  metabase_data:
  localstack_data:
