services:
  kafka:
    image: apache/kafka:3.9.2
    container_name: crypto-pulse-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9091
      KAFKA_LISTENERS: CONTROLLER://localhost:9091,HOST://0.0.0.0:9092,DOCKER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: HOST://localhost:9092,DOCKER://kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,DOCKER:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: DOCKER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 15s

  postgres:
    image: postgres:16
    container_name: crypto-pulse-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: cryptopulse
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse -d cryptopulse"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  ingest:
    build:
      context: ./ingest
    container_name: crypto-pulse-ingest
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  binance-ingest:
    build:
      context: ./binance-ingest
    container_name: crypto-pulse-binance-ingest
    env_file:
      - .env
    ports:
      - "8001:8001"
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  flink-jobmanager:
    build:
      context: ./flink
    container_name: crypto-pulse-flink-jm
    command: jobmanager
    ports:
      - "8081:8081"
      - "9249:9249"
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        parallelism.default: 1
        metrics.reporters: prom
        metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
        metrics.reporter.prom.port: 9249
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/overview || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  flink-taskmanager:
    build:
      context: ./flink
    container_name: crypto-pulse-flink-tm
    command: taskmanager
    ports:
      - "9250:9250"
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
        metrics.reporters: prom
        metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
        metrics.reporter.prom.port: 9250
    restart: unless-stopped

  flink-submitter:
    build:
      context: ./flink
    container_name: crypto-pulse-flink-submitter
    network_mode: service:flink-jobmanager
    command: /opt/flink/submit-job.sh
    environment:
      FLINK_JOBMANAGER: localhost
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      flink-jobmanager:
        condition: service_healthy
      flink-taskmanager:
        condition: service_started
      ingest:
        condition: service_started
    restart: "no"

  transform:
    build:
      context: .
      dockerfile: transform/Dockerfile
    container_name: crypto-pulse-transform
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.8.0
    container_name: crypto-pulse-kafka-exporter
    command:
      - "--kafka.server=kafka:9093"
      - "--log.level=info"
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: crypto-pulse-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://pulse:pulse@postgres:5432/cryptopulse?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: crypto-pulse-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    depends_on:
      - kafka-exporter
      - postgres-exporter
      - ingest
      - binance-ingest
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.5.2
    container_name: crypto-pulse-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  metabase:
    image: metabase/metabase:v0.53.3.1
    container_name: crypto-pulse-metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: pulse
      MB_DB_PASS: pulse
      MB_DB_HOST: postgres
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  metabase_data:
