name: Smoke E2E

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  smoke:
    name: Postgres + dbt + GX smoke
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: cryptopulse
          POSTGRES_USER: pulse
          POSTGRES_PASSWORD: pulse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pulse -d cryptopulse"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse
      POSTGRES_DB: cryptopulse
    steps:
      - uses: actions/checkout@v4

      - name: Install Postgres client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: transform/requirements.txt

      - name: Install dependencies
        run: pip install -r transform/requirements.txt

      - name: Run smoke test
        run: bash scripts/smoke_test.sh
