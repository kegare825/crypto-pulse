name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: Unit tests & contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install test dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest tests/ -v

  dbt:
    name: dbt parse & compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: transform/requirements.txt

      - name: Install dbt
        run: pip install dbt-postgres==1.9.0

      - name: dbt deps
        working-directory: dbt
        run: dbt deps --profiles-dir .

      - name: dbt parse
        working-directory: dbt
        run: dbt parse --profiles-dir .

      - name: dbt compile
        working-directory: dbt
        run: dbt compile --profiles-dir .

  infra:
    name: Docker & Prometheus rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker compose
        run: docker compose config --quiet

      - name: Validate Prometheus alert rules
        run: |
          docker run --rm --entrypoint promtool \
            -v "${{ github.workspace }}/observability/prometheus:/etc/prometheus:ro" \
            prom/prometheus:v3.2.1 \
            check rules /etc/prometheus/alerts.yml
